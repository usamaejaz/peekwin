name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Windows validation
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run release-readiness checks
        shell: pwsh
        run: .\scripts\release-readiness.ps1 -Configuration Release
