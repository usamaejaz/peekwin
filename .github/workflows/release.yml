name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release readiness
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run release-readiness checks
        shell: pwsh
        run: .\scripts\release-readiness.ps1 -Configuration Release -ExpectedTag "${{ github.ref_name }}"

  build:
    name: Build ${{ matrix.rid }}
    runs-on: windows-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
          - rid: win-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained build
        shell: pwsh
        run: |
          dotnet publish .\src\peekwin.csproj `
            -c Release `
            -r "${{ matrix.rid }}" `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -o ".\artifacts\publish\${{ matrix.rid }}"

      - name: Stage release executable
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $expectedVersion = $tag.TrimStart("v")
          $rid = "${{ matrix.rid }}"
          $sourceExe = Join-Path $PWD "artifacts\publish\$rid\peekwin.exe"
          $releaseExe = Join-Path $PWD "artifacts\peekwin-$tag-$rid.exe"
          $checksumPath = "$releaseExe.sha256"

          if (-not (Test-Path $sourceExe)) {
            throw "Published executable not found: $sourceExe"
          }

          if (Test-Path $releaseExe) {
            Remove-Item $releaseExe -Force
          }

          Copy-Item -Path $sourceExe -Destination $releaseExe -Force

          $versionInfo = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($releaseExe)
          $actualVersion = $versionInfo.ProductVersion
          if ([string]::IsNullOrWhiteSpace($actualVersion)) {
            throw "Built executable is missing ProductVersion metadata."
          }

          $actualVersion = $actualVersion.Trim()
          if ($actualVersion -ne $expectedVersion) {
            throw "Built executable metadata reports version '$actualVersion' but release tag is '$tag'."
          }

          $checksum = (Get-FileHash -Path $releaseExe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$checksum  $(Split-Path -Leaf $releaseExe)" | Set-Content -Path $checksumPath -NoNewline

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: |
            artifacts/peekwin-${{ github.ref_name }}-${{ matrix.rid }}.exe
            artifacts/peekwin-${{ github.ref_name }}-${{ matrix.rid }}.exe.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release executables
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  publish_chocolatey:
    name: Publish Chocolatey package
    runs-on: windows-latest
    needs: release
    env:
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

    steps:
      - name: Check out repository
        if: ${{ env.CHOCOLATEY_API_KEY != '' }}
        uses: actions/checkout@v4

      - name: Download release executables
        if: ${{ env.CHOCOLATEY_API_KEY != '' }}
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Build Chocolatey package
        if: ${{ env.CHOCOLATEY_API_KEY != '' }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $checksumLine = Get-Content -Path "release-assets/peekwin-$tag-win-x64.exe.sha256" -Raw
          $checksum = ($checksumLine -split '\s+')[0].Trim().ToLowerInvariant()
          $url64 = "https://github.com/${{ github.repository }}/releases/download/$tag/peekwin-$tag-win-x64.exe"

          .\scripts\build-chocolatey-package.ps1 `
            -Version $version `
            -Url64 $url64 `
            -Checksum64 $checksum

      - name: Push Chocolatey package
        if: ${{ env.CHOCOLATEY_API_KEY != '' }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $packagePath = Join-Path $PWD "artifacts\chocolatey\peekwin.$version.nupkg"
          if (-not (Test-Path $packagePath)) {
            throw "Chocolatey package not found: $packagePath"
          }

          choco push $packagePath --source https://push.chocolatey.org/ --api-key "$env:CHOCOLATEY_API_KEY"
          if ($LASTEXITCODE -ne 0) {
            throw "choco push failed with exit code $LASTEXITCODE."
          }

  publish_winget:
    name: Submit winget update
    runs-on: windows-latest
    needs: release
    env:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        if: ${{ env.WINGET_CREATE_GITHUB_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Set up .NET SDK for wingetcreate
        if: ${{ env.WINGET_CREATE_GITHUB_TOKEN != '' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Download wingetcreate
        if: ${{ env.WINGET_CREATE_GITHUB_TOKEN != '' }}
        shell: pwsh
        run: |
          $targetPath = Join-Path $env:RUNNER_TEMP 'wingetcreate.exe'
          Invoke-WebRequest -Uri 'https://aka.ms/wingetcreate/latest' -OutFile $targetPath
          & $targetPath --version

      - name: Submit winget package update
        if: ${{ env.WINGET_CREATE_GITHUB_TOKEN != '' }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          .\scripts\publish-winget.ps1 `
            -Version $version `
            -Token "$env:WINGET_CREATE_GITHUB_TOKEN" `
            -WingetCreatePath (Join-Path $env:RUNNER_TEMP 'wingetcreate.exe') `
            -Submit
