name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
          - rid: win-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained build
        shell: pwsh
        run: |
          dotnet publish .\src\peekwin.csproj `
            -c Release `
            -r "${{ matrix.rid }}" `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -o ".\artifacts\publish\${{ matrix.rid }}"

      - name: Package release archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $rid = "${{ matrix.rid }}"
          $archiveRoot = "peekwin-$tag-$rid"
          $stageDir = Join-Path $PWD "artifacts\package\$archiveRoot"
          $zipPath = Join-Path $PWD "artifacts\$archiveRoot.zip"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item -Path ".\artifacts\publish\$rid\*" -Destination $stageDir -Recurse -Force

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path $stageDir -DestinationPath $zipPath

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/peekwin-${{ github.ref_name }}-${{ matrix.rid }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*.zip
