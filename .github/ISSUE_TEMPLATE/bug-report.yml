name: Bug report
description: Report a reproducible problem with peekwin
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include the exact command, whether the target app was elevated, and any `--verbose` output.
  - type: input
    id: command
    attributes:
      label: Command
      description: Exact `peekwin` command that triggered the issue
      placeholder: peekwin window focus --handle 0x001F09A2 --verbose
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Windows architecture
      options:
        - win-x64
        - win-arm64
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Windows version, target app, elevated/non-elevated, monitor setup, virtual desktops, etc.
  - type: textarea
    id: verbose
    attributes:
      label: Verbose output
      description: Paste relevant `--verbose` output if available
      render: shell
